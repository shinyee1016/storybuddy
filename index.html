<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>StoryBuddy · 故事伙伴</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Fredoka:wght@400..600&display=swap" rel="stylesheet" />
<script>
/* ============================================================
   后端端点：Cloudflare Pages Functions，与前端同网域。
   对应档案 functions/api/generate.js（无需填完整网址）。
   ============================================================ */
const WORKER_URL = "/api/generate";
/* ============================================================ */
</script>
<style>
  :root{
    --bg1:#fff6ec; --bg2:#ffe9d6; --bg3:#f6e7ff;
    --paper:#fffaf3; --paper-edge:#f0e2cf;
    --ink:#4a3b2f; --ink-soft:#7a6a59;
    --accent:#ff8a5b; --accent-deep:#e8693a;
    --accent2:#7c6cf0; --accent2-deep:#5a49d6;
    --chip:#fff; --chip-on:#ffd9c2;
    --shadow:0 10px 30px rgba(120,80,40,.18);
    --radius:22px;
    /* 更圆润、柔性、可爱的字体；中文用圆体 Yuanti SC，英文用 Baloo 2 / Fredoka */
    --font: "Baloo 2", "Fredoka", "Yuanti SC", "Hannotate SC", ui-rounded, "Quicksand", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font); color:var(--ink); letter-spacing:.2px;
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg3), transparent 60%),
      radial-gradient(1000px 700px at 110% 0%, var(--bg2), transparent 55%),
      linear-gradient(180deg, var(--bg1), #fff);
    min-height:100vh; -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:980px;margin:0 auto;padding:18px 18px 60px}

  header.app{display:flex;align-items:center;gap:12px;padding:10px 4px 18px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px;flex:1 1 auto;min-width:0}
  .logo{width:52px;height:52px;border-radius:18px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:grid;place-items:center;font-size:28px;box-shadow:var(--shadow)}
  .brand h1{font-size:clamp(24px,5vw,32px);margin:0;line-height:1.1;font-weight:800}
  .brand p{margin:0;color:var(--ink-soft);font-size:13px;font-weight:600}
  .lang-switch{display:inline-flex;background:#fff;border-radius:999px;padding:4px;box-shadow:var(--shadow);gap:2px}
  .lang-switch button{border:0;background:transparent;color:var(--ink-soft);padding:8px 14px;border-radius:999px;
    font-family:inherit;font-weight:700;cursor:pointer;font-size:14px;transition:.2s}
  .lang-switch button[aria-pressed="true"]{background:linear-gradient(135deg,var(--accent),var(--accent-deep));
    color:#fff;box-shadow:0 4px 12px rgba(232,105,58,.4)}

  .card{background:rgba(255,255,255,.72);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.7);
    border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);margin-bottom:18px}
  .field{margin-bottom:20px}.field:last-child{margin-bottom:0}
  label.lbl{display:block;font-weight:800;margin-bottom:8px;font-size:16px}
  .hint{color:var(--ink-soft);font-size:13px;font-weight:600}

  .age-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .age-badge{min-width:74px;text-align:center;background:linear-gradient(135deg,var(--accent2),var(--accent2-deep));
    color:#fff;border-radius:18px;padding:8px 10px;box-shadow:0 6px 16px rgba(90,73,214,.35)}
  .age-badge b{font-size:26px;display:block;line-height:1}.age-badge span{font-size:11px;opacity:.9}
  input[type=range]{-webkit-appearance:none;appearance:none;height:14px;border-radius:999px;flex:1 1 200px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));outline-offset:4px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;
    background:#fff;border:4px solid var(--accent-deep);cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  input[type=range]::-moz-range-thumb{width:26px;height:26px;border-radius:50%;background:#fff;border:4px solid var(--accent-deep);cursor:pointer}
  .level-pill{display:inline-block;margin-top:10px;background:var(--chip-on);color:var(--accent-deep);
    font-weight:800;padding:6px 14px;border-radius:999px;font-size:13px}

  input[type=text]{width:100%;padding:14px 16px;border-radius:16px;border:2px solid var(--paper-edge);
    background:#fff;font-family:inherit;font-size:16px;color:var(--ink)}
  input[type=text]:focus{outline:3px solid var(--accent);border-color:transparent}

  .chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
  .chip{border:2px solid var(--paper-edge);background:var(--chip);color:var(--ink);padding:10px 16px;border-radius:999px;
    cursor:pointer;font-family:inherit;font-weight:700;font-size:14px;transition:.15s;display:inline-flex;align-items:center;gap:7px}
  .chip:hover{transform:translateY(-2px)}
  .chip[aria-pressed="true"]{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff;border-color:transparent;
    box-shadow:0 6px 14px rgba(232,105,58,.4)}
  .surprise{border:0;background:linear-gradient(135deg,#ffd36b,#ff9b3d);color:#5a3a12;font-weight:800;padding:11px 18px;
    border-radius:999px;cursor:pointer;font-family:inherit;font-size:14px;box-shadow:0 6px 16px rgba(255,155,61,.45)}
  .row-split{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .row-split input[type=text]{flex:1 1 220px}

  .privacy{display:flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:13px;font-weight:600;margin-top:10px}
  .generate{width:100%;border:0;cursor:pointer;font-family:inherit;font-weight:800;font-size:20px;color:#fff;padding:18px;
    border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 12px 28px rgba(124,108,240,.4);transition:.15s}
  .generate:hover{transform:translateY(-2px)}.generate:disabled{opacity:.6;cursor:wait;transform:none}

  .status{text-align:center;padding:30px 18px;color:var(--ink-soft);font-weight:700}
  .spinner{width:46px;height:46px;border-radius:50%;margin:0 auto 14px;border:5px solid var(--chip-on);
    border-top-color:var(--accent-deep);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .friendly{background:#fff3e8;border:2px solid #ffd9c2;border-radius:18px;padding:24px;text-align:center}
  .friendly .big{font-size:46px;margin-bottom:8px}.friendly h3{margin:.2em 0;color:var(--accent-deep)}.friendly button{margin-top:14px}

  #stage{display:none}#stage.show{display:block}
  .book-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .book-bar .left{display:flex;gap:8px;align-items:center}
  .btn{border:0;background:#fff;color:var(--ink);padding:11px 16px;border-radius:16px;cursor:pointer;font-family:inherit;
    font-weight:800;font-size:14px;box-shadow:var(--shadow);display:inline-flex;gap:7px;align-items:center}
  .btn:hover{transform:translateY(-1px)}
  .btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent-deep));color:#fff}
  .btn.toggle[aria-pressed="true"]{background:linear-gradient(135deg,var(--accent2),var(--accent2-deep));color:#fff}

  .book-scene{perspective:2400px;display:grid;place-items:center;padding:4px}
  /* 直式：单页；横式/宽版：两页并排 */
  .book{position:relative;width:min(440px,92vw);aspect-ratio:3/4;transform-style:preserve-3d}
  .book.wide{width:min(860px,96vw);aspect-ratio:1.6/1}

  .spread{position:absolute;inset:0;display:flex;border-radius:20px;overflow:hidden;background:var(--paper);
    box-shadow:var(--shadow);border:1px solid var(--paper-edge)}
  .spread .page{position:relative;flex:1 1 0;min-width:0;display:flex;flex-direction:column;background:var(--paper);overflow:hidden}
  .spread.two .page:first-child{box-shadow:inset -12px 0 22px -12px rgba(120,80,40,.22)}
  .spread.two .page:last-child{box-shadow:inset 12px 0 22px -12px rgba(120,80,40,.22)}

  .page .art{position:relative;flex:1 1 auto;min-height:0;background:linear-gradient(135deg,#ffe9d6,#f0e6ff);
    display:grid;place-items:center;overflow:hidden}
  .page .art img{width:100%;height:100%;object-fit:cover;display:block;animation:fade .6s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .page .art .emoji-fallback{font-size:78px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.15))}
  .img-loading{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.85);border-radius:999px;padding:5px 12px;
    font-size:12px;font-weight:700;color:var(--ink-soft);display:flex;align-items:center;gap:7px}
  .img-loading .mini{width:14px;height:14px;border-radius:50%;border:3px solid var(--chip-on);border-top-color:var(--accent-deep);animation:spin .9s linear infinite}
  .page .text{flex:0 0 auto;padding:16px 20px 20px;background:var(--paper);font-size:clamp(16px,2.6vw,20px);font-weight:600;
    color:var(--ink);border-top:1px solid var(--paper-edge);max-height:44%;overflow:auto}
  .page .pageno{position:absolute;top:12px;left:14px;background:rgba(255,255,255,.85);border-radius:999px;padding:3px 12px;
    font-size:12px;font-weight:800;color:var(--ink-soft);z-index:2}
  .page .pemoji{position:absolute;top:10px;right:14px;font-size:26px;z-index:2}
  .page.cover .art{background:linear-gradient(150deg,#ffcaa6,#c9b6ff)}
  .page.cover .cover-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:26px;
    background:linear-gradient(transparent,rgba(40,20,10,.55));color:#fff}
  .page.cover h2{font-size:clamp(26px,7vw,40px);margin:0 0 6px;text-shadow:0 3px 12px rgba(0,0,0,.4);font-weight:800}
  .page.cover .by{font-weight:700;opacity:.95;text-shadow:0 2px 8px rgba(0,0,0,.5)}

  .tap{position:absolute;top:0;bottom:0;width:34%;z-index:5;cursor:pointer;border:0;background:transparent}
  .tap.l{left:0}.tap.r{right:0}
  .tap:focus-visible{outline:3px solid var(--accent2);outline-offset:-6px;border-radius:18px}

  /* 翻页：在书本范围内、绕中轴翻转，底下放好目标页，翻完即定格新页 —— 不会闪出两页 */
  .flipper{position:absolute;inset:0;transform-style:preserve-3d;z-index:20;pointer-events:none;transform:rotateY(0deg);transform-origin:center}
  .flipper .face{position:absolute;inset:0;backface-visibility:hidden}
  .flipper .back{transform:rotateY(180deg)}

  .nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:16px}
  .nav button{width:56px;height:56px;border-radius:50%;border:0;cursor:pointer;font-size:22px;background:#fff;
    box-shadow:var(--shadow);color:var(--accent-deep);font-weight:900}
  .nav button:disabled{opacity:.35;cursor:default}
  .dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:60%}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--paper-edge);cursor:pointer;border:0}
  .dot[aria-current="true"]{background:var(--accent-deep);transform:scale(1.4)}

  .endbar{display:flex;justify-content:center;margin-top:12px}
  .endbar[hidden]{display:none}
  .endbar .btn{font-size:16px;padding:14px 22px}
  .bottom{display:flex;flex-direction:column;align-items:center}
  /* 紧凑页码：‹  第 x 页  › */
  .pagelabel{font-weight:800;color:var(--ink-soft);min-width:104px;text-align:center;font-size:15px;
    background:#fff;border-radius:999px;padding:10px 16px;box-shadow:var(--shadow)}

  /* ===== 全屏阅读模式：故事书满版；工具列与页码列默认收起，上下滑动时滑出 ===== */
  body.reading{overflow:hidden}
  body.reading .wrap{max-width:none;padding:0;margin:0}
  body.reading header.app{display:none}
  body.reading #stage{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;justify-content:center;
    background:
      radial-gradient(1200px 600px at 10% -10%, var(--bg3), transparent 60%),
      radial-gradient(1000px 700px at 110% 0%, var(--bg2), transparent 55%),
      linear-gradient(180deg, var(--bg1), #fff)}
  body.reading .book-scene{flex:1;height:100%;padding:0}
  body.reading .book{width:min(94vw,calc(90vh * .75));width:min(94vw,calc(90dvh * .75));height:auto;aspect-ratio:3/4;max-height:90dvh}
  body.reading .book.wide{width:min(97vw,calc(88vh * 1.6));width:min(97vw,calc(88dvh * 1.6));aspect-ratio:1.6/1;max-height:88dvh}

  body.reading .book-bar{position:fixed;top:0;left:0;right:0;z-index:60;margin:0;justify-content:center;gap:8px;flex-wrap:nowrap;
    padding:calc(env(safe-area-inset-top,0px) + 12px) 12px 16px;
    background:linear-gradient(rgba(255,246,236,.97),rgba(255,246,236,0));
    transform:translateY(-112%);opacity:0;pointer-events:none;transition:transform .32s ease,opacity .32s ease}
  body.reading .bottom{position:fixed;bottom:0;left:0;right:0;z-index:60;gap:10px;
    padding:18px 12px calc(env(safe-area-inset-bottom,0px) + 16px);
    background:linear-gradient(rgba(255,246,236,0),rgba(255,246,236,.97));
    transform:translateY(112%);opacity:0;pointer-events:none;transition:transform .32s ease,opacity .32s ease}
  body.reading.chrome .book-bar{transform:none;opacity:1;pointer-events:auto}
  body.reading.chrome .bottom{transform:none;opacity:1;pointer-events:auto}
  body.reading .nav{margin-top:0}

  body.read-aloud .page .text{font-size:clamp(22px,5vw,30px);font-weight:800;color:#1f1710;background:#fff;line-height:1.55;max-height:60%}
  body.read-aloud .page .art{background:#000}

  :focus-visible{outline:3px solid var(--accent2);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;transition-duration:.001ms !important}}
  footer{text-align:center;color:var(--ink-soft);font-size:12px;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="logo" aria-hidden="true">📖✨</div>
      <div>
        <h1 id="appTitle">故事伙伴</h1>
        <p id="appTagline">几秒钟生成专属睡前绘本</p>
      </div>
    </div>
    <div class="lang-switch" role="group" aria-label="Language">
      <button id="langZh" aria-pressed="true">中文</button>
      <button id="langEn" aria-pressed="false">English</button>
    </div>
  </header>

  <section class="card" id="formCard">
    <div class="field">
      <label class="lbl" id="ageLabel" for="age">孩子的年龄</label>
      <div class="age-row">
        <div class="age-badge"><b id="ageVal">5</b><span id="ageYears">岁</span></div>
        <input type="range" id="age" min="1" max="12" value="5" step="1" aria-describedby="levelPill" />
      </div>
      <div class="level-pill" id="levelPill"></div>
    </div>

    <div class="field">
      <label class="lbl" id="nameLabel" for="childName">孩子的名字 <span class="hint" id="optional">（可选）</span></label>
      <input type="text" id="childName" maxlength="24" autocomplete="off" placeholder="例如 小米" />
    </div>

    <div class="field">
      <label class="lbl" id="themeLabel">故事主题</label>
      <div class="chips" id="chips" role="group" aria-label="主题"></div>
      <div class="row-split">
        <input type="text" id="customTheme" maxlength="60" placeholder="或自己输入主题…" autocomplete="off" />
        <button class="surprise" id="surpriseBtn">🎁 <span id="surpriseTxt">盲盒手气</span></button>
      </div>
    </div>

    <div class="field">
      <button class="generate" id="generateBtn">✨ <span id="genTxt">生成我们的绘本</span></button>
      <div class="privacy">🔒 <span id="privacyTxt">我们不会储存您孩子的任何资料，一切只在本次使用中。</span></div>
    </div>
  </section>

  <section id="statusArea"></section>

  <section id="stage">
    <div class="book-bar">
      <div class="left">
        <button class="btn" id="saveBtn">💾 <span id="saveTxt">储存绘本</span></button>
      </div>
      <div class="left">
        <button class="btn toggle" id="readAloudBtn" aria-pressed="false">🔆 <span id="readAloudTxt">朗读模式</span></button>
        <button class="btn toggle" id="ttsBtn" aria-pressed="false">🔊 <span id="ttsTxt">语音朗读</span></button>
      </div>
    </div>
    <div class="book-scene">
      <div class="book" id="book" tabindex="0" aria-roledescription="storybook" aria-label="绘本">
        <button class="tap l" id="tapL" aria-label="上一页"></button>
        <button class="tap r" id="tapR" aria-label="下一页"></button>
      </div>
    </div>
    <div class="bottom" id="bottomBar">
      <div class="nav">
        <button id="prevBtn" aria-label="上一页">‹</button>
        <div class="pagelabel" id="pageLabel" aria-live="polite"></div>
        <button id="nextBtn" aria-label="下一页">›</button>
      </div>
      <div class="endbar" id="endBar" hidden>
        <button class="btn primary" id="againBtn">✨ <span id="againTxt">再做一本绘本</span></button>
      </div>
    </div>
  </section>

  <footer><span id="footerTxt">用心为小小梦想家打造 · 家长永远是最终把关人。</span></footer>
</div>

<script>
/* ============================================================
   StoryBuddy 前端 — 透过 Cloudflare Pages Function 呼叫 Gemini
   ============================================================ */

/* ---------- 儿童安全规则（前端亦内建一份） ---------- */
const SAFETY_RULES = `儿童安全（1-12岁）硬性规则，不可妥协：禁止暴力、恐怖、性、爱情，以及任何孩子可能模仿的危险行为（火、火柴、药物、武器、跟陌生人走、爬高处、玩水）。
不得描绘或指名真实在世名人；若主题涉及名人，改用一般化的正面角色（例如「一位善良的科学家」）。
若涉及国家/文化，只聚焦美食、风景、节庆与善意，不要刻板印象与政治。
用词与事物必须真实正确：只使用现实中真实存在的物品、动植物、食物与正确无误的词语；绝不发明虚构物品或编造、拼错的词。
插图也必须遵守同样安全规则：柔和温暖、绝无暴力/武器/恐怖/真实名人。`;

  },
  en:{

    gen:"Create our storybook", privacy:"We don't save any of your child's information. Everything stays in this session.",

const SURPRISE_POOL={

function levelFor(age){
  if(age<=3) return {idx:0,pages:5};
  if(age<=6) return {idx:1,pages:7};
  if(age<=9) return {idx:2,pages:9};
  return {idx:3,pages:11};
}

/* ---------- 状态 ---------- */
let lang="zh", selectedTheme="", book=null;
let views=[], cur=0, twoUp=false, flipping=false, ttsOn=false;
const reduceMotion=window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const $=id=>document.getElementById(id);
const statusArea=$("statusArea"), stage=$("stage"), bookEl=$("book");

/* ---------- 语言 ---------- */
function applyLang(){
  const t=I18N[lang];
  document.documentElement.lang = lang==="zh"?"zh":"en";
  $("appTitle").textContent=t.title; $("appTagline").textContent=t.tagline;
  $("ageLabel").textContent=t.ageLabel; $("ageYears").textContent=t.years;
  $("nameLabel").firstChild.textContent=t.nameLabel+" "; $("optional").textContent=t.optional;
  $("childName").placeholder=t.namePh;
  $("themeLabel").textContent=t.themeLabel; $("customTheme").placeholder=t.custom; $("surpriseTxt").textContent=t.surprise;
  $("genTxt").textContent=t.gen; $("privacyTxt").textContent=t.privacy;
  $("saveTxt").textContent=t.save; $("againTxt").textContent=t.again;
  $("readAloudTxt").textContent=t.readAloud; $("ttsTxt").textContent=t.tts;
  $("footerTxt").textContent=t.footer;
  $("langZh").setAttribute("aria-pressed",lang==="zh"); $("langEn").setAttribute("aria-pressed",lang==="en");
  renderChips(); updateAge(); if(book) render();
}
$("langZh").onclick=()=>{lang="zh";applyLang();};
$("langEn").onclick=()=>{lang="en";applyLang();};

function renderChips(){
  const t=I18N[lang], c=$("chips"); c.innerHTML="";
  THEME_KEYS.forEach(k=>{
    const b=document.createElement("button"); b.className="chip"; b.type="button";
    b.setAttribute("aria-pressed",selectedTheme===k);
    b.innerHTML=`<span aria-hidden="true">${THEME_EMOJI[k]}</span> ${t.themes[k]}`;
    b.onclick=()=>{ selectedTheme=(selectedTheme===k)?"":k; $("customTheme").value=""; renderChips(); };
    c.appendChild(b);
  });
}
$("customTheme").addEventListener("input",()=>{ if($("customTheme").value.trim()){selectedTheme="";renderChips();} });

function updateAge(){
  const age=+$("age").value, lv=levelFor(age);
  $("ageVal").textContent=age;
  $("levelPill").textContent=I18N[lang].levels[lv.idx]+" · ~"+lv.pages+I18N[lang].pagesUnit;
}
$("age").addEventListener("input",updateAge);

$("surpriseBtn").onclick=()=>{
  const pool=SURPRISE_POOL[lang], pick=pool[Math.floor(Math.random()*pool.length)];
  selectedTheme=""; renderChips(); $("customTheme").value=pick; $("customTheme").focus();
};

function chosenTheme(){
  const custom=$("customTheme").value.trim();
  if(custom) return custom;
  if(selectedTheme) return I18N.en.themes[selectedTheme]; // 主题以英文键传给后端，语言由 lang 控制
  return null;
}

/* ============================================================
   呼叫后端
   ============================================================ */
async function workerCall(payload){
  if(!WORKER_URL){ throw {noUrl:true}; }
  const res=await fetch(WORKER_URL,{
    method:"POST", headers:{"content-type":"application/json"}, body:JSON.stringify(payload)
  });
  if(!res.ok){ throw new Error("Worker "+res.status+" "+(await res.text().catch(()=>""))); }
  return res.json();
}

const IMG_SAFETY_SUFFIX = " Gentle soft cozy children's picture-book illustration, warm pastel colours, rounded friendly shapes. NO violence, NO weapons, NO fear/horror, NO scary monsters, NO real people or celebrities, no text in image.";

/* ============================================================
   生成流程
   ============================================================ */
$("generateBtn").onclick=generate;
async function generate(){
  const theme=chosenTheme();
  if(!theme){ $("surpriseBtn").click(); return; }
  const age=+$("age").value, name=$("childName").value.trim(), t=I18N[lang];

  exitReading();                 // 先恢复表格再覆盖状态（避免残留）
  setStatus(`<div class="status"><div class="spinner"></div>${t.writing}</div>`);
  stage.classList.remove("show"); $("generateBtn").disabled=true;

  try{
    const result=await workerCall({
      action:"story", lang, age, name, theme, pages:levelFor(age).pages, safety:SAFETY_RULES
    });
    if(result && result.refused){ showRefused(); return; }
    if(!result || !Array.isArray(result.pages) || !result.pages.length) throw new Error("bad story");

    book={
      title:(result.title||(lang==="zh"?"我们的故事":"Our Story")).toString(),
      pages:result.pages.map(p=>({
        text:(p.text||"").toString(),
        emoji:((p.emoji||"📖").toString().trim())||"📖",
        imagePrompt:(p.imagePrompt||"").toString(),
        characterSheet:(p.characterSheet||"").toString(),
        img:undefined
      }))
    };
    buildViews(); cur=0;
    setStatus(""); enterReading(); stage.classList.add("show"); render();
    stage.scrollIntoView({behavior:reduceMotion?"auto":"smooth",block:"start"});
    loadImages();
  }catch(err){
    if(err&&err.noUrl){
      setStatus(`<div class="friendly"><div class="big">🔧</div><p>${t.noUrl}</p></div>`);
    }else{
      console.error(err);
      setStatus(`<div class="friendly"><div class="big">🌧️</div><p>${t.error}</p>
        <button class="btn primary" id="retry">${t.tryAgain}</button></div>`);
      $("retry").onclick=()=>setStatus("");
    }
  }finally{ $("generateBtn").disabled=false; }
}

function showRefused(){
  const t=I18N[lang];
  setStatus(`<div class="friendly"><div class="big">🌸</div><h3>${t.refusedH}</h3><p>${t.refusedP}</p>
    <button class="btn primary" id="tryAnother">${t.tryAgain}</button></div>`);
  $("tryAnother").onclick=()=>{ setStatus(""); $("customTheme").value=""; $("customTheme").focus(); };
}
function setStatus(html){ statusArea.innerHTML=html; }

/* 生成后收起表格、满版呈现绘本；再做一本时恢复 */
function enterReading(){
  $("formCard").style.display="none"; document.querySelector("footer").style.display="none";
  document.body.classList.add("reading"); showChrome();
}
function exitReading(){
  $("formCard").style.display=""; document.querySelector("footer").style.display="";
  document.body.classList.remove("reading","chrome"); clearTimeout(chromeTimer);
}

/* 工具列/页码列：默认收起，上下滑动或翻页时滑出，停顿后自动收起 */
let chromeTimer=null;
function showChrome(){
  if(!document.body.classList.contains("reading")) return;
  document.body.classList.add("chrome");
  clearTimeout(chromeTimer);
  chromeTimer=setTimeout(()=>document.body.classList.remove("chrome"),3200);
}
window.addEventListener("wheel",showChrome,{passive:true});
let chY=null;
stage.addEventListener("touchstart",e=>{ chY=e.touches[0].clientY; },{passive:true});
stage.addEventListener("touchmove",e=>{
  if(chY!==null && Math.abs(e.touches[0].clientY-chY)>20) showChrome();
},{passive:true});

/* 依序为每页要插图（后端回传 base64） */
async function loadImages(){
  for(let i=0;i<book.pages.length;i++){
    const p=book.pages[i];
    if(p.img!==undefined) continue;
    try{
      const r=await workerCall({
        action:"image",
        characterSheet:p.characterSheet,
        imagePrompt:p.imagePrompt + IMG_SAFETY_SUFFIX,
        safety:SAFETY_RULES
      });
      p.img = (r&&r.image) ? ("data:"+(r.mime||"image/png")+";base64,"+r.image) : null;
    }catch(e){ p.img=null; }
    // 若这页正显示在当前跨页（含封面用第一页插图），刷新
    if(!flipping && views[cur] && (views[cur].includes(i+1) || (cur===0 && i===0))) render();
  }
}

/* ============================================================
   绘本渲染 —— view 模型
   单元 0 = 封面；单元 k = 第 k 页（book.pages[k-1]）
   直式每个 view 一页；宽版页面成对（封面永远单独）
   ============================================================ */
function buildViews(){
  twoUp = window.matchMedia("(min-width: 760px)").matches;
  views=[[0]];
  const N=book.pages.length, step=twoUp?2:1;
  for(let i=1;i<=N;i+=step){
    if(twoUp && i+1<=N) views.push([i,i+1]);
    else views.push([i]);
  }
}

function artHTML(p){
  if(p.img){ return `<img src="${p.img}" alt="" />`; }
  const loading=(p.img===undefined), t=I18N[lang];
  return `<div class="emoji-fallback" aria-hidden="true">${p.emoji||"📖"}</div>
    ${loading?`<div class="img-loading"><span class="mini"></span>${t.drawing}</div>`:""}`;
}

function pageHTML(unit){
  const t=I18N[lang];
  if(unit===0){
    const p0=book.pages[0];
    const by=$("childName").value.trim()? (t.by+" "+escapeHtml($("childName").value.trim())) : t.byNoName;
    return `<div class="page cover"><div class="art">${artHTML(p0)}</div>
      <div class="cover-overlay"><h2>${escapeHtml(book.title)}</h2><div class="by">${by} 💖</div></div></div>`;
  }
  const i=unit-1, p=book.pages[i];
  const label = lang==="zh" ? `${t.pageWord} ${i+1} 页 / ${book.pages.length}` : `${t.pageWord} ${i+1} / ${book.pages.length}`;
  return `<div class="page"><div class="pageno">${label}</div>
    <div class="pemoji" aria-hidden="true">${p.emoji}</div>
    <div class="art">${artHTML(p)}</div>
    <div class="text">${escapeHtml(p.text)}</div></div>`;
}

function spreadHTML(vi){
  const units=views[vi]||[0];
  return `<div class="spread${units.length>1?' two':''}">${units.map(u=>pageHTML(u)).join("")}</div>`;
}

function clearBook(){ [...bookEl.querySelectorAll(".spread,.flipper")].forEach(n=>n.remove()); }

function render(){
  if(!book) return;
  flipping=false; clearBook();
  bookEl.classList.toggle("wide", twoUp);
  const node=document.createElement("div"); node.innerHTML=spreadHTML(cur);
  bookEl.insertBefore(node.firstElementChild,$("tapL"));
  renderPageLabel();
  $("prevBtn").disabled=cur===0; $("nextBtn").disabled=cur===views.length-1;
  $("endBar").hidden = !(cur===views.length-1);     // 最后一页才显示「再做一本」
  bookEl.setAttribute("aria-label", cur===0?I18N[lang].coverWord:(I18N[lang].pageWord+" "+cur));
  // 注意：朗读不在 render 触发（插图载入会重绘），改在真正翻页时触发，避免语音重叠
}

/* 紧凑页码：封面 / 第 x 页（宽版两页显示范围） */
function renderPageLabel(){
  const t=I18N[lang], el=$("pageLabel");
  if(cur===0){ el.textContent=t.coverWord; return; }
  const u=views[cur], a=u[0], b=u[u.length-1];
  if(lang==="zh") el.textContent = (u.length>1?`第 ${a}-${b} 页`:`第 ${a} 页`);
  else el.textContent = (u.length>1?`Page ${a}-${b}`:`Page ${a}`);
}

/* 翻页 + 干净的 3D 动画 */
function goTo(target){
  if(!book||flipping) return;
  target=Math.max(0,Math.min(views.length-1,target));
  showChrome();
  if(target===cur) return;
  const dir=target>cur?1:-1;
  if(reduceMotion){ cur=target; render(); if(ttsOn) speakCurrent(); return; }
  doFlip(target,dir);
}
function next(){ goTo(cur+1); }
function prev(){ goTo(cur-1); }

function doFlip(target,dir){
  flipping=true; cancelSpeak();
  clearBook();
  bookEl.classList.toggle("wide", twoUp);
  // 底层先放好目标跨页，翻页时透出来
  const base=document.createElement("div"); base.innerHTML=spreadHTML(target);
  bookEl.insertBefore(base.firstElementChild,$("tapL"));
  // 翻转层：正面=当前页，背面=目标页，绕中轴翻
  const flip=document.createElement("div");
  flip.className="flipper";
  flip.innerHTML=`<div class="face front"></div><div class="face back"></div>`;
  flip.querySelector(".front").innerHTML=spreadHTML(cur);
  flip.querySelector(".back").innerHTML=spreadHTML(target);
  bookEl.insertBefore(flip,$("tapL"));
  const endDeg = dir>0 ? -180 : 180;
  flip.style.transform="rotateY(0deg)";
  flip.style.transition="transform .6s cubic-bezier(.45,.05,.25,1)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ flip.style.transform=`rotateY(${endDeg}deg)`; }));
  let done=false;
  const finish=()=>{ if(done) return; done=true; cur=target; render(); if(ttsOn) speakCurrent(); };
  flip.addEventListener("transitionend",e=>{ if(e.propertyName==="transform") finish(); });
  setTimeout(finish, 750); // 保险：动画结束后定格新页
}
$("nextBtn").onclick=next; $("prevBtn").onclick=prev; $("tapL").onclick=prev; $("tapR").onclick=next;

bookEl.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight"){e.preventDefault();next();}
  else if(e.key==="ArrowLeft"){e.preventDefault();prev();}
});
document.addEventListener("keydown",e=>{
  if(!stage.classList.contains("show")) return;
  if(document.activeElement&&["INPUT","SELECT","TEXTAREA"].includes(document.activeElement.tagName)) return;
  if(e.key==="ArrowRight") next(); else if(e.key==="ArrowLeft") prev();
});
let touchX=null,touchY=null;
bookEl.addEventListener("touchstart",e=>{touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;},{passive:true});
bookEl.addEventListener("touchend",e=>{
  if(touchX===null) return;
  const dx=e.changedTouches[0].clientX-touchX, dy=e.changedTouches[0].clientY-touchY;
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){ dx<0?next():prev(); }
  touchX=touchY=null;
});

/* 视窗变化：在单页/双页之间切换并保持当前位置 */
let resizeTimer=null;
window.addEventListener("resize",()=>{
  if(!book) return;
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{
    const firstUnit = (views[cur]&&views[cur][0]) || 0;
    const wasTwo=twoUp; buildViews();
    if(wasTwo===twoUp) return;          // 模式没变就不重排
    cur=Math.max(0, views.findIndex(v=>v.includes(firstUnit)));
    render();
  },200);
});

/* 再做一本：恢复表格、收起绘本 */
$("againBtn").onclick=()=>{
  cancelSpeak(); ttsOn=false; $("ttsBtn").setAttribute("aria-pressed",false);
  book=null; stage.classList.remove("show"); setStatus(""); exitReading();
  $("formCard").scrollIntoView({behavior:reduceMotion?"auto":"smooth"});
};

/* ---------- 朗读模式 / 语音 ---------- */
$("readAloudBtn").onclick=()=>{ const on=document.body.classList.toggle("read-aloud"); $("readAloudBtn").setAttribute("aria-pressed",on); };
$("ttsBtn").onclick=()=>{ ttsOn=!ttsOn; $("ttsBtn").setAttribute("aria-pressed",ttsOn); if(ttsOn) speakCurrent(); else cancelSpeak(); };
/* 语音：挑选温柔女声（像妈妈），并避免字句重叠 */
let voicesCache=[];
function loadVoices(){ try{ voicesCache=window.speechSynthesis.getVoices()||[]; }catch(e){ voicesCache=[]; } }
if("speechSynthesis"in window){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
const FEMALE_PREF={
  zh:["Tingting","Ting-Ting","婷婷","Mei-Jia","Meijia","美佳","Sinji","Sin-ji","Google 普通话","Xiaoxiao","Xiaoyi","Yaoyao","Huihui","Qianqian","Yating"],
  en:["Samantha","Victoria","Karen","Tessa","Moira","Serena","Allison","Ava","Susan","Zira","Aria","Jenny","Google US English","Google UK English Female","Female"]
};
function pickVoice(){
  const code=lang==="zh"?"zh":"en";
  const list=voicesCache.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(code));
  for(const n of FEMALE_PREF[lang]){
    const v=list.find(v=>v.name&&v.name.toLowerCase().includes(n.toLowerCase()));
    if(v) return v;
  }
  return list.find(v=>/female|woman|girl|samantha|tingting|mei|婷/i.test(v.name||"")) || list[0] || null;
}
function speakCurrent(){
  if(!("speechSynthesis"in window)||!book) return;
  cancelSpeak();
  if(!voicesCache.length) loadVoices();
  const text = cur===0 ? book.title : views[cur].map(u=>book.pages[u-1].text).join(lang==="zh"?"，":". ");
  if(!text) return;
  // cancel 后稍等再说，避免部分浏览器把上一句和这句叠在一起
  setTimeout(()=>{
    const u=new SpeechSynthesisUtterance(text);
    const v=pickVoice();
    if(v){ u.voice=v; u.lang=v.lang; } else { u.lang=lang==="zh"?"zh-CN":"en-US"; }
    u.rate=0.84;   // 放慢一点，更温柔顺畅
    u.pitch=1.15;  // 略高，更柔和的女声
    u.volume=1;
    window.speechSynthesis.speak(u);
  },110);
}
function cancelSpeak(){ if("speechSynthesis"in window) window.speechSynthesis.cancel(); }

/* ============================================================
   储存绘本到离线档（自带阅读器的单一 HTML，可离线开启）
   ============================================================ */
$("saveBtn").onclick=saveBook;
function saveBook(){
  if(!book) return;
  const t=I18N[lang];
  const data={
    title: book.title,
    by: ($("childName").value.trim()? (t.by+" "+$("childName").value.trim()) : t.byNoName)+" 💖",
    cover: t.coverWord,
    ttsLang: lang==="zh"?"zh-CN":"en-US",
    pages: book.pages.map(p=>({ text:p.text, emoji:p.emoji, img:p.img||null }))
  };
  const html=offlineHTML(data, lang);
  const blob=new Blob([html],{type:"text/html"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download=(book.title||"StoryBuddy").replace(/[\\/:*?"<>|]/g,"_")+".html";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
  const sp=$("saveTxt"), old=sp.textContent; sp.textContent=t.saved; setTimeout(()=>{sp.textContent=old;},2000);
}
